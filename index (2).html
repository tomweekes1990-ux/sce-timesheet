<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCE Timesheet — Test Mode</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --o:#e05c2a;--o3:rgba(224,92,42,0.07);
  --bg:#0a0a0a;--s1:#131313;--s2:#1a1a1a;
  --b1:#1e1e1e;--b2:#282828;--b3:#333;
  --t1:#ddd5c5;--t2:#8a8278;--t3:#4a4540;--t4:#2e2b28;
  --red:#c0392b;--green:#27ae60;
  --mono:'DM Mono','Courier New',monospace;--disp:'Bebas Neue',sans-serif;
  --r:8px;--r2:12px;
}
body{font-family:var(--mono);background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
input,textarea{font-family:var(--mono);background:transparent;border:none;outline:none;color:var(--t1);width:100%}
input::placeholder,textarea::placeholder{color:var(--t4)}
input[type=checkbox]{width:auto;accent-color:var(--o);cursor:pointer;transform:scale(1.2)}
input[type=time]{color-scheme:dark}
button{font-family:var(--mono);cursor:pointer;border:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.hidden{display:none!important}
.fade-in{animation:fadeIn .28s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TOAST */
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:9px 15px;font-size:11px;letter-spacing:.5px;min-width:200px;animation:fadeIn .2s ease}
.toast.ok{border-color:#2a5e3a;color:#4ade80}
.toast.err{border-color:#5e2a2a;color:#f87171}
.toast.info{color:var(--t2)}

/* BUTTONS */
.btn{padding:8px 18px;border-radius:var(--r);font-size:10px;letter-spacing:1.5px;cursor:pointer;transition:all .15s;border:1px solid var(--b2);background:var(--s2);color:var(--t2)}
.btn:hover{border-color:var(--b3);color:var(--t1)}
.btn-o{background:var(--o);border-color:var(--o);color:#fff}
.btn-o:hover{background:#c94e20}
.btn-ghost{background:transparent;border-color:var(--b1);color:var(--t3)}
.btn-ghost:hover{border-color:var(--o);color:var(--o)}
.btn-sm{padding:5px 12px;font-size:9px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2)}
.card-head{padding:12px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.clbl{font-size:9px;letter-spacing:2.5px;color:var(--o)}
.card-body{padding:20px}

/* FIELD */
.flbl{font-size:9px;letter-spacing:2px;color:var(--t3);margin-bottom:6px}
.fwrap{border-bottom:1px solid var(--b2);padding:4px 0;transition:border-color .18s}
.fwrap:focus-within{border-bottom-color:var(--o)}
.finp{font-size:13px}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .35s}
.lmark{width:52px;height:52px;background:var(--o);border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:30px;color:#fff}

/* HEADER */
#hdr{background:var(--s1);border-bottom:1px solid var(--b1);padding:0 26px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hmark{width:32px;height:32px;background:var(--o);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:19px;color:#fff}
.hname{font-family:var(--disp);font-size:15px;letter-spacing:2px}
.hsub{font-size:8px;color:var(--t3);letter-spacing:1px;margin-top:1px}
.test-pill{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);color:#fbbf24;font-size:8px;letter-spacing:1.5px;padding:3px 10px;border-radius:4px}

/* SHELL */
#shell{display:flex;height:calc(100vh - 54px)}

/* SIDEBAR */
#sidenav{width:165px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;padding:14px 0;overflow-y:auto}
.snlbl{font-size:8px;letter-spacing:2.5px;color:var(--t3);padding:0 13px;margin-bottom:7px}
.dni{display:flex;align-items:center;gap:7px;padding:8px 13px;cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.dni:hover{background:rgba(255,255,255,0.02)}
.dni.active{border-left-color:var(--o);background:var(--o3)}
.dni.active .dname{color:var(--o)}
.ddot{width:6px;height:6px;border-radius:50%;border:1px solid var(--b3);flex-shrink:0;transition:all .18s}
.dni.filled .ddot{background:var(--o);border-color:var(--o)}
.dname{font-size:10px;letter-spacing:1px;color:var(--t3)}
.dhrs{font-size:9px;color:var(--t4);margin-left:auto}
.dni.filled .dhrs{color:var(--o)}
.sndiv{height:1px;background:var(--b1);margin:9px 0}
.snbtn{margin:3px 9px;padding:7px 11px;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--t3);font-size:9px;letter-spacing:1.5px;cursor:pointer;transition:all .15s;text-align:left;display:block;width:calc(100% - 18px)}
.snbtn:hover,.snbtn.active{border-color:var(--o);color:var(--o);background:var(--o3)}
.snbtn.hist:hover,.snbtn.hist.active{border-color:var(--b3);color:var(--t2);background:rgba(255,255,255,0.02)}
.wktotal{padding:9px 13px;font-size:8px;color:var(--t3);letter-spacing:1px}
.wktotal span{color:var(--o);font-size:14px;display:block;margin-top:2px}

/* MAIN */
#main{flex:1;overflow-y:auto;padding:22px 26px}

/* SETUP */
.bigtitle{font-family:var(--disp);font-size:36px;letter-spacing:4px;color:var(--o);margin-bottom:3px}
.bigtsub{font-size:10px;color:var(--t3);letter-spacing:2px;margin-bottom:20px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 30px}
.scell{padding:9px 0;border-bottom:1px solid var(--b1)}

/* DAY */
.prog{height:2px;background:var(--b1);border-radius:1px;margin-bottom:16px;overflow:hidden}
.progf{height:100%;background:var(--o);border-radius:1px;transition:width .4s}
.savebar{display:flex;align-items:center;gap:7px;font-size:9px;color:var(--t3);letter-spacing:1px;margin-bottom:13px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--t4);flex-shrink:0;transition:background .25s}
.sdot.saved{background:var(--green)}
.sdot.saving{background:var(--o);animation:pulse .8s infinite}
.tgrid{display:grid;grid-template-columns:1fr 1fr 1fr 76px 76px;gap:14px;align-items:end}
.cval{font-size:20px;color:var(--o);font-weight:500;padding:2px 0}
.cval.empty{color:var(--b3);font-size:14px}
.toggs{display:flex;gap:18px}
.togi{display:flex;align-items:center;gap:6px}
.togi label{font-size:11px;color:var(--t3);letter-spacing:1px;cursor:pointer}
.wlist{display:flex;flex-direction:column;gap:5px}
.wi{display:flex;gap:7px;align-items:flex-start;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:8px 11px;transition:border-color .12s;animation:fadeIn .16s ease}
.wi:focus-within{border-color:var(--b2)}
.wnum{font-size:10px;color:var(--t4);margin-top:2px;flex-shrink:0;width:15px;text-align:right}
.wta{font-size:12px;line-height:1.6;resize:none;flex:1;min-height:22px}
.wdel{background:transparent;border:none;color:var(--t4);font-size:14px;cursor:pointer;transition:color .1s;padding:0 2px;flex-shrink:0;line-height:1}
.wdel:hover{color:var(--red)}
.addbtn{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--b2);border-radius:var(--r);padding:8px 11px;color:var(--t3);font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .15s;width:100%;margin-top:4px}
.addbtn:hover{border-color:var(--o);color:var(--o)}
.arrows{display:flex;gap:7px;margin-top:20px}
.abtn{flex:1;padding:9px;border:1px solid var(--b2);border-radius:var(--r);background:transparent;color:var(--t3);font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .15s}
.abtn:hover{border-color:var(--o);color:var(--o)}
.abtn.pri{background:var(--o);border-color:var(--o);color:#fff}
.abtn.pri:hover{background:#c94e20}

/* SUMMARY */
.mgrid{display:grid;grid-template-columns:repeat(3,1fr)}
.mcell{padding:11px 17px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1)}
.mcell:nth-child(3n){border-right:none}
.mcell:nth-last-child(-n+3){border-bottom:none}
.totbar{display:flex;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;margin-bottom:15px}
.tc{flex:1;padding:13px 17px;border-right:1px solid var(--b1)}
.tc:last-child{border-right:none}
.tclbl{font-size:8px;letter-spacing:2px;color:var(--t3);margin-bottom:4px}
.tcval{font-size:19px;color:var(--o);font-weight:500}
.tcval.dim{color:var(--t1);font-size:14px}
.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:8px;letter-spacing:2px;color:var(--t3);padding:7px 11px;text-align:left;border-bottom:1px solid var(--b1);background:var(--s2)}
.stbl td{padding:9px 11px;font-size:12px;border-bottom:1px solid var(--b1);vertical-align:top}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:rgba(255,255,255,0.013)}
.dpill{display:inline-flex;align-items:center;gap:3px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:2px 6px;font-size:10px;color:#aaa;margin:2px 2px 2px 0;line-height:1.5}

/* HISTORY */
.hcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:15px 19px;margin-bottom:9px;cursor:pointer;transition:border-color .13s}
.hcard:hover{border-color:var(--b3)}
.sbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;letter-spacing:1px}
.sb-ok{background:rgba(39,174,96,0.12);color:#4ade80;border:1px solid rgba(39,174,96,0.25)}
.sb-draft{background:rgba(243,156,18,0.1);color:#fbbf24;border:1px solid rgba(243,156,18,0.25)}

/* MODAL */
.movl{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .18s ease}
.mbox{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r2);padding:26px;width:400px;max-width:95vw}
.mtitle{font-family:var(--disp);font-size:22px;letter-spacing:3px;color:var(--o);margin-bottom:12px}
.macts{display:flex;gap:7px;justify-content:flex-end;margin-top:18px}
</style>
</head>
<body>

<div id="loading">
  <div class="lmark">S</div>
  <div style="font-size:10px;color:var(--t3);letter-spacing:2px">LOADING…</div>
</div>

<div id="toasts"></div>

<div class="movl hidden" id="movl">
  <div class="mbox">
    <div class="mtitle" id="mtitle"></div>
    <div id="mbody"></div>
    <div class="macts" id="macts"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="hdr">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="hmark">S</div>
      <div>
        <div class="hname">SCE TIMESHEET</div>
        <div class="hsub">ABN 56 627 507 028 · tweekes@scepl.com.au</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="test-pill">⚠ TEST MODE</div>
      <button class="btn btn-sm" id="btn-new-hdr">+ NEW WEEK</button>
    </div>
  </div>

  <div id="shell">
    <nav id="sidenav">
      <div class="snlbl">CURRENT WEEK</div>
      <div id="dayitems"></div>
      <div class="sndiv"></div>
      <button class="snbtn" id="sumbtn">📋 SUMMARY</button>
      <div class="sndiv"></div>
      <div class="snlbl" style="margin-top:2px">SAVED WEEKS</div>
      <button class="snbtn hist" id="histbtn">🗂 MY HISTORY</button>
      <div class="wktotal">WEEK TOTAL<span id="wkhrs">—</span></div>
    </nav>
    <div id="main"></div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import{getFirestore,doc,setDoc,getDocs,collection,query,where,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cfg={apiKey:"AIzaSyBiB4rCKSWfWrbbJ4uP3tByIO5kXeILKpQ",authDomain:"sce-timesheet-1841d.firebaseapp.com",projectId:"sce-timesheet-1841d",storageBucket:"sce-timesheet-1841d.firebasestorage.app",messagingSenderId:"451326665894",appId:"1:451326665894:web:cafa183200dd0da96c4067"};
const fb=initializeApp(cfg), auth=getAuth(fb), db=getFirestore(fb);

const DAYS=["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY","SUNDAY"];
const SH=["MON","TUE","WED","THU","FRI","SAT","SUN"];

let uid=null,ts=null,view="setup",wid=null,saveTO=null;

// ── tiny helpers ──────────────────────────────────────────────────────────────
const toast=(m,t="info")=>{const el=document.createElement("div");el.className=`toast ${t}`;el.textContent=m;document.getElementById("toasts").appendChild(el);setTimeout(()=>el.remove(),3000)};
const ch=(s,f)=>{if(!s||!f)return null;const[sh,sm]=s.split(":").map(Number),[fh,fm]=f.split(":").map(Number),d=(fh*60+fm)-(sh*60+sm);return d>0?d/60:null};
const fh=h=>{if(h==null||isNaN(h))return"—";const r=Math.floor(h),m=Math.round((h-r)*60);return m>0?`${r}h ${m}m`:`${r}h`};
const wdates=we=>{if(!we)return DAYS.map(()=>"");const[y,m,d]=we.split("-").map(Number),e=new Date(y,m-1,d);return DAYS.map((_,i)=>{const dt=new Date(e);dt.setDate(e.getDate()-(6-i));return dt.toLocaleDateString("en-AU",{day:"2-digit",month:"2-digit",year:"2-digit"})})};
const wtot=days=>days.reduce((a,d)=>a+(d.total||0),0);
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fd=()=>DAYS.map(()=>({date:"",start:"",finish:"",total:null,onCall:false,laha:false,descs:[""]}));
const fm=()=>({empName:"",weekEnding:"",position:"",clientName:"",workLocation:"",project:""});

const modal=(title,body,acts)=>{document.getElementById("mtitle").textContent=title;document.getElementById("mbody").innerHTML=body;const a=document.getElementById("macts");a.innerHTML="";acts.forEach(x=>{const b=document.createElement("button");b.className=`btn ${x.c||""}`;b.textContent=x.l;b.onclick=x.f;a.appendChild(b)});document.getElementById("movl").classList.remove("hidden")};
const closeM=()=>document.getElementById("movl").classList.add("hidden");
document.getElementById("movl").addEventListener("click",e=>{if(e.target===e.currentTarget)closeM()});

// ── firebase auth ─────────────────────────────────────────────────────────────
onAuthStateChanged(auth,user=>{
  if(user){
    uid=user.uid;
    const lo=document.getElementById("loading");lo.style.opacity="0";setTimeout(()=>lo.style.display="none",350);
    document.getElementById("app").classList.remove("hidden");
    init();
  }
});
signInAnonymously(auth).catch(()=>{
  uid="local-guest";
  document.getElementById("loading").style.display="none";
  document.getElementById("app").classList.remove("hidden");
  init();
  toast("Offline mode — enable Anonymous Auth in Firebase console for cloud saves","info");
});

// ── init ──────────────────────────────────────────────────────────────────────
function init(){ts={meta:fm(),days:fd()};view="setup";wid=null;buildNav();render()}

document.getElementById("btn-new-hdr").onclick=()=>modal("NEW WEEK","<p style='color:var(--t2);font-size:13px'>Start a fresh timesheet? Current data is saved.</p>",
  [{l:"CANCEL",f:closeM},{l:"NEW WEEK",c:"btn-o",f:()=>{closeM();init()}}]);

// ── sidebar ───────────────────────────────────────────────────────────────────
function buildNav(){
  const c=document.getElementById("dayitems");c.innerHTML="";
  if(view==="setup"||view==="history"){document.getElementById("wkhrs").textContent="—";return}
  DAYS.forEach((day,i)=>{
    const d=ts.days[i],el=document.createElement("div");
    el.className=`dni ${d.total!=null?"filled":""} ${view===`day-${i}`?"active":""}`;
    el.id=`dni${i}`;
    el.innerHTML=`<div class="ddot"></div><div class="dname">${SH[i]}</div><div class="dhrs">${d.total!=null?fh(d.total):""}</div>`;
    el.onclick=()=>sw(`day-${i}`);
    c.appendChild(el);
  });
  const t=wtot(ts.days);document.getElementById("wkhrs").textContent=t>0?fh(t):"—";
}
function updNav(){
  DAYS.forEach((_,i)=>{const el=document.getElementById(`dni${i}`);if(!el)return;const d=ts.days[i];el.className=`dni ${d.total!=null?"filled":""} ${view===`day-${i}`?"active":""}`;el.querySelector(".dhrs").textContent=d.total!=null?fh(d.total):""});
  document.getElementById("sumbtn")?.classList.toggle("active",view==="summary");
  document.getElementById("histbtn")?.classList.toggle("active",view==="history");
  const t=wtot(ts.days);document.getElementById("wkhrs").textContent=t>0?fh(t):"—";
}
document.getElementById("sumbtn").onclick=()=>sw("summary");
document.getElementById("histbtn").onclick=()=>sw("history");
function sw(v){view=v;updNav();render()}

// ── router ────────────────────────────────────────────────────────────────────
function render(){
  const m=document.getElementById("main");m.innerHTML="";
  if(view==="setup"){rSetup(m);return}
  if(view==="summary"){rSummary(m);return}
  if(view==="history"){rHistory(m);return}
  rDay(m,parseInt(view.split("-")[1]));
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function rSetup(m){
  m.innerHTML=`<div class="bigtitle fade-in">NEW TIMESHEET</div><div class="bigtsub">FILL IN YOUR WEEK DETAILS</div>
  <div class="card"><div class="card-head"><span class="clbl">WEEK DETAILS</span></div><div class="card-body">
  <div class="sgrid">${[["EMPLOYEE NAME","empName","text"],["WEEK ENDING","weekEnding","date"],["POSITION","position","text"],["CLIENT NAME","clientName","text"],["WORK LOCATION","workLocation","text"],["PROJECT","project","text"]].map(([l,k,t])=>`<div class="scell"><div class="flbl">${l}</div><div class="fwrap"><input class="finp" data-k="${k}" type="${t}" value="${ts.meta[k]||""}" placeholder="${l.toLowerCase()}"/></div></div>`).join("")}</div>
  <button class="btn btn-o" id="gostart" style="margin-top:20px;padding:10px 26px">START TIMESHEET →</button>
  </div></div>`;
  m.querySelectorAll("[data-k]").forEach(i=>i.addEventListener("input",()=>{ts.meta[i.dataset.k]=i.value}));
  document.getElementById("gostart").onclick=()=>{
    if(!ts.meta.weekEnding){toast("Set a week ending date","err");return}
    if(!ts.meta.empName){toast("Enter your name","err");return}
    const dates=wdates(ts.meta.weekEnding);
    ts.days.forEach((d,i)=>{if(!d.date)d.date=dates[i]});
    wid=`${uid}_${ts.meta.weekEnding}`;
    buildNav();sw("day-0");save();
  };
}

// ── DAY ───────────────────────────────────────────────────────────────────────
function rDay(m,i){
  const d=ts.days[i],dates=wdates(ts.meta.weekEnding);
  m.innerHTML=`<div class="prog"><div class="progf" style="width:${(i/7*100).toFixed(0)}%"></div></div>
  <div class="bigtitle fade-in">${DAYS[i]}</div>
  <div class="bigtsub">${dates[i]||"—"} · DAY ${i+1} OF 7</div>
  <div class="savebar"><div class="sdot" id="sdot"></div><span id="stxt">—</span></div>
  <div class="card" style="margin-bottom:13px">
    <div class="card-head"><span class="clbl">HOURS</span>
    <div class="toggs">
      <div class="togi"><input type="checkbox" id="oc${i}" ${d.onCall?"checked":""}><label for="oc${i}">ON CALL</label></div>
      <div class="togi"><input type="checkbox" id="la${i}" ${d.laha?"checked":""}><label for="la${i}">LAHA</label></div>
    </div></div>
    <div class="card-body">
      <div class="tgrid">
        <div><div class="flbl">START TIME</div><div class="fwrap"><input type="time" class="finp" id="st${i}" value="${d.start}"/></div></div>
        <div><div class="flbl">FINISH TIME</div><div class="fwrap"><input type="time" class="finp" id="fn${i}" value="${d.finish}"/></div></div>
        <div><div class="flbl">DATE</div><div class="fwrap"><input class="finp" id="dt${i}" value="${d.date||dates[i]}" placeholder="dd/mm/yy"/></div></div>
        <div><div class="flbl">TOTAL</div><div class="cval ${d.total!=null?"":"empty"}" id="cv${i}">${fh(d.total)}</div></div>
      </div>
    </div>
  </div>
  <div class="card" style="margin-bottom:13px">
    <div class="card-head"><span class="clbl">WORK DESCRIPTIONS</span><span style="font-size:9px;color:var(--t3)" id="dc${i}">${d.descs.filter(s=>s.trim()).length} ITEM(S)</span></div>
    <div class="card-body"><div class="wlist" id="wl${i}"></div><button class="addbtn" id="awb${i}"><span style="color:var(--o);font-size:15px">+</span> ADD WORK ITEM</button></div>
  </div>
  <div class="arrows">
    ${i>0?`<button class="abtn" id="prevb">← ${SH[i-1]}</button>`:"<div></div>"}
    ${i<6?`<button class="abtn pri" id="nextb">NEXT: ${SH[i+1]} →</button>`:`<button class="abtn pri" id="nextb">VIEW SUMMARY →</button>`}
  </div>`;
  document.getElementById(`st${i}`).onchange=e=>{d.start=e.target.value;recalc(i)};
  document.getElementById(`fn${i}`).onchange=e=>{d.finish=e.target.value;recalc(i)};
  document.getElementById(`dt${i}`).oninput=e=>{d.date=e.target.value;save()};
  document.getElementById(`oc${i}`).onchange=e=>{d.onCall=e.target.checked;save()};
  document.getElementById(`la${i}`).onchange=e=>{d.laha=e.target.checked;save()};
  document.getElementById(`awb${i}`).onclick=()=>addW(i);
  if(i>0)document.getElementById("prevb").onclick=()=>sw(`day-${i-1}`);
  document.getElementById("nextb").onclick=()=>sw(i<6?`day-${i+1}`:"summary");
  rItems(i);
}

function recalc(i){
  const d=ts.days[i];d.total=ch(d.start,d.finish);
  const cv=document.getElementById(`cv${i}`);
  if(cv){cv.textContent=fh(d.total);cv.className=`cval ${d.total!=null?"":"empty"}`}
  updNav();save();
}

function rItems(i){
  const d=ts.days[i],list=document.getElementById(`wl${i}`);
  if(!list)return;list.innerHTML="";
  d.descs.forEach((txt,j)=>{
    const el=document.createElement("div");el.className="wi";
    el.innerHTML=`<div class="wnum">${j+1}.</div><textarea class="wta" rows="1" placeholder="Describe work performed…">${esc(txt)}</textarea><button class="wdel">×</button>`;
    const ta=el.querySelector("textarea");
    ta.style.height="auto";
    ta.oninput=()=>{d.descs[j]=ta.value;ta.style.height="auto";ta.style.height=ta.scrollHeight+"px";const dc=document.getElementById(`dc${i}`);if(dc)dc.textContent=`${d.descs.filter(s=>s.trim()).length} ITEM(S)`;save()};
    ta.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(j===d.descs.length-1)addW(i);else list.querySelectorAll(".wta")[j+1]?.focus()}};
    setTimeout(()=>{ta.style.height=ta.scrollHeight+"px"},0);
    el.querySelector(".wdel").onclick=()=>{if(d.descs.length===1)d.descs[0]="";else d.descs.splice(j,1);rItems(i);save()};
    list.appendChild(el);
  });
}

function addW(i){ts.days[i].descs.push("");rItems(i);setTimeout(()=>{const items=document.querySelectorAll(`#wl${i} .wta`);items[items.length-1]?.focus()},40)}

// ── SAVE ──────────────────────────────────────────────────────────────────────
function setS(s){
  const dot=document.getElementById("sdot"),txt=document.getElementById("stxt");
  if(!dot||!txt)return;
  if(s==="saving"){dot.className="sdot saving";txt.textContent="Saving…"}
  else if(s==="saved"){dot.className="sdot saved";txt.textContent="Saved to cloud"}
  else{dot.className="sdot";txt.textContent="Unsaved"}
}
async function save(){
  if(!wid)return;setS("unsaved");clearTimeout(saveTO);
  saveTO=setTimeout(async()=>{
    setS("saving");
    try{await setDoc(doc(db,"timesheets",wid),{...ts,uid,wid,updatedAt:serverTimestamp()});setS("saved")}
    catch(e){toast("Save failed — check Firebase has Anonymous Auth enabled","err");setS("unsaved")}
  },1100);
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function rSummary(m){
  const dates=wdates(ts.meta.weekEnding),tot=wtot(ts.days);
  const filled=ts.days.filter(d=>d.total!=null).length;
  const oc=ts.days.filter(d=>d.onCall).length,la=ts.days.filter(d=>d.laha).length;
  m.innerHTML=`<div class="bigtitle fade-in">WEEKLY SUMMARY</div>
  <div class="bigtsub">${(ts.meta.empName||"").toUpperCase()} · WEEK ENDING ${ts.meta.weekEnding||"—"}</div>
  <div class="card" style="margin-bottom:13px"><div class="mgrid">${[["EMPLOYEE NAME",ts.meta.empName],["WEEK ENDING",ts.meta.weekEnding],["POSITION",ts.meta.position],["CLIENT NAME",ts.meta.clientName],["WORK LOCATION",ts.meta.workLocation],["PROJECT",ts.meta.project]].map(([l,v])=>`<div class="mcell"><div class="flbl">${l}</div><div style="font-size:13px;margin-top:3px">${v||"—"}</div></div>`).join("")}</div></div>
  <div class="totbar">
    <div class="tc"><div class="tclbl">TOTAL HOURS</div><div class="tcval">${tot>0?fh(tot):"—"}</div></div>
    <div class="tc"><div class="tclbl">DAYS WORKED</div><div class="tcval">${filled}</div></div>
    <div class="tc"><div class="tclbl">ON CALL</div><div class="tcval ${oc===0?"dim":""}">${oc}</div></div>
    <div class="tc"><div class="tclbl">LAHA</div><div class="tcval ${la===0?"dim":""}">${la}</div></div>
    <div class="tc"><div class="tclbl">AVG / DAY</div><div class="tcval">${filled>0?fh(tot/filled):"—"}</div></div>
  </div>
  <div class="card" style="margin-bottom:13px">
    <div class="card-head"><span class="clbl">DAY-BY-DAY BREAKDOWN</span><span style="font-size:9px;color:var(--t3)">${filled}/7 DAYS</span></div>
    <div style="overflow-x:auto"><table class="stbl">
      <thead><tr><th>DAY</th><th>DATE</th><th>START</th><th>FINISH</th><th>HOURS</th><th style="text-align:center">ON CALL</th><th style="text-align:center">LAHA</th><th>WORK DESCRIPTIONS</th></tr></thead>
      <tbody>${ts.days.map((d,i)=>`<tr>
        <td style="font-size:10px;letter-spacing:1px;color:${i>=5?"#555":"#aaa"};font-weight:500">${DAYS[i]}</td>
        <td style="font-size:11px;color:var(--t3)">${dates[i]||d.date||"—"}</td>
        <td style="color:var(--t2)">${d.start||"—"}</td><td style="color:var(--t2)">${d.finish||"—"}</td>
        <td style="color:${d.total!=null?"var(--o)":"var(--b3)"};font-weight:500">${fh(d.total)}</td>
        <td style="text-align:center;color:var(--o)">${d.onCall?"✓":""}</td>
        <td style="text-align:center;color:var(--o)">${d.laha?"✓":""}</td>
        <td>${d.descs.filter(s=>s.trim()).map(s=>`<span class="dpill"><span style="color:var(--o);font-size:7px">▸</span>${esc(s)}</span>`).join("")||"<span style='color:var(--t4);font-size:11px'>No entries</span>"}</td>
      </tr>`).join("")}</tbody>
    </table></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px">
    <div class="card"><div class="card-head"><span class="clbl">SIGNATURES</span></div>
    <div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
      ${[["EMPLOYEE NAME","se"],["EMPLOYEE SIGNATURE","ss"],["CLIENT REP NAME","cr"],["CLIENT SIGNATURE","cs"]].map(([l,id])=>`<div><div class="flbl">${l}</div><div class="fwrap"><input class="finp" id="${id}" placeholder="${l}"/></div></div>`).join("")}
    </div></div>
    <div class="card"><div class="card-head"><span class="clbl">NOTES</span></div>
    <div class="card-body"><textarea id="snotes" style="width:100%;background:transparent;border:none;outline:none;color:var(--t1);font-family:var(--mono);font-size:13px;resize:none;line-height:1.8" rows="5" placeholder="Notes or instructions…"></textarea></div></div>
  </div>
  <div style="display:flex;gap:9px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-o" id="pdfbtn" style="padding:10px 22px;font-size:11px;letter-spacing:2px">EXPORT PDF →</button>
    <button class="btn" id="subbtn" style="padding:10px 22px;font-size:11px;letter-spacing:2px">SUBMIT ✓</button>
    <button class="btn btn-ghost" id="newbtn" style="padding:10px 22px;font-size:11px;letter-spacing:2px">+ NEW WEEK</button>
    <span style="font-size:9px;color:var(--t3)">Auto-saved to cloud</span>
  </div>`;
  document.getElementById("pdfbtn").onclick=()=>pdf(ts);
  document.getElementById("newbtn").onclick=()=>init();
  document.getElementById("subbtn").onclick=async()=>{ts.submitted=true;await save();toast("Submitted!","ok");document.getElementById("subbtn").textContent="✓ SUBMITTED";document.getElementById("subbtn").disabled=true};
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
async function rHistory(m){
  m.innerHTML=`<div class="bigtitle fade-in">MY HISTORY</div><div class="bigtsub">ALL SAVED TIMESHEETS</div><div id="hlist"><div style="color:var(--t3);font-size:12px">Loading…</div></div>`;
  try{
    const q=query(collection(db,"timesheets"),where("uid","==",uid),orderBy("updatedAt","desc"));
    const snap=await getDocs(q);
    const list=document.getElementById("hlist");
    if(snap.empty){list.innerHTML=`<div style="color:var(--t3);font-size:12px;padding:20px 0">No saved timesheets yet.</div>`;return}
    list.innerHTML="";
    snap.forEach(d=>{
      const data=d.data(),t=wtot(data.days||[]);
      const el=document.createElement("div");el.className="hcard fade-in";
      el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:13px">📅 Week ending: <strong>${data.meta?.weekEnding||"—"}</strong></div>
        <div style="display:flex;align-items:center;gap:9px">
          <div style="color:var(--o);font-size:13px;font-weight:500">${t>0?fh(t):"—"}</div>
          ${data.submitted?`<span class="sbadge sb-ok">SUBMITTED</span>`:`<span class="sbadge sb-draft">DRAFT</span>`}
          <button class="btn btn-sm btn-o pdfb">PDF</button>
        </div></div>
        <div style="font-size:10px;color:var(--t3);margin-top:4px">${data.meta?.empName||""} ${data.meta?.clientName?`· ${data.meta.clientName}`:""} · ${data.days?.filter(d=>d.total!=null).length||0} days worked</div>`;
      el.querySelector(".pdfb").addEventListener("click",e=>{e.stopPropagation();pdf(data)});
      el.addEventListener("click",()=>{ts={...data};wid=d.id;view="summary";buildNav();render()});
      list.appendChild(el);
    });
  }catch(e){document.getElementById("hlist").innerHTML=`<div style="color:#f87171;font-size:12px">Error: ${e.message}</div>`}
}

// ── PDF ───────────────────────────────────────────────────────────────────────
function pdf(data){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
  const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight();
  const or=[224,92,42],li=[232,224,208],cb=[22,22,22];
  const meta=data.meta||fm(),days=data.days||fd(),dates=wdates(meta.weekEnding);

  doc.setFillColor(13,13,13);doc.rect(0,0,W,H,"F");
  doc.setFillColor(19,19,19);doc.rect(0,0,W,22,"F");
  doc.setFillColor(...or);doc.roundedRect(8,4,14,14,2,2,"F");
  doc.setFont("helvetica","bold");doc.setFontSize(11);doc.setTextColor(255,255,255);doc.text("S",13.5,13.5);
  doc.setFontSize(13);doc.setTextColor(...li);doc.text("SPECIALISED CIVIL & ELECTRICAL PTY LTD",26,10);
  doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor(90,85,80);
  doc.text("ABN: 56 627 507 028  ·  tweekes@scepl.com.au  ·  Billywillinga NSW 2795",26,16);
  doc.setFont("helvetica","bold");doc.setFontSize(20);doc.setTextColor(...or);doc.text("WEEKLY TIMESHEET",8,32);
  doc.setFillColor(...or);doc.rect(8,34,22,0.8,"F");
  doc.setFillColor(...cb);doc.roundedRect(8,36,W-16,22,2,2,"F");
  doc.setDrawColor(30,30,30);doc.setLineWidth(0.3);doc.roundedRect(8,36,W-16,22,2,2,"S");
  const mf=[["EMPLOYEE NAME",meta.empName],["WEEK ENDING",meta.weekEnding],["POSITION",meta.position],["CLIENT NAME",meta.clientName],["WORK LOCATION",meta.workLocation],["PROJECT",meta.project]];
  const cw=(W-16)/3;
  mf.forEach(([l,v],i)=>{const col=i%3,row=Math.floor(i/3),x=8+col*cw+5,y=40+row*10;doc.setFont("helvetica","normal");doc.setFontSize(6);doc.setTextColor(80,75,70);doc.text(l,x,y);doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(...li);doc.text(v||"—",x,y+5);if(col<2){doc.setDrawColor(30,30,30);doc.line(8+(col+1)*cw,37,8+(col+1)*cw,57)}});
  doc.autoTable({startY:60,head:[["DAY","DATE","START","FINISH","HOURS","ON CALL","LAHA","WORK DESCRIPTIONS"]],
    body:days.map((d,i)=>[DAYS[i],dates[i]||d.date||"—",d.start||"—",d.finish||"—",d.total!=null?fh(d.total):"—",d.onCall?"✓":"",d.laha?"✓":"",d.descs.filter(s=>s.trim()).map((s,j)=>`${j+1}. ${s}`).join("\n")||"—"]),
    theme:"plain",margin:{left:8,right:8},tableWidth:W-16,
    styles:{font:"helvetica",fontSize:8,textColor:li,fillColor:[18,18,18],cellPadding:2.8,lineColor:[28,28,28],lineWidth:0.3,valign:"top"},
    headStyles:{fillColor:[14,14,14],textColor:[70,65,62],fontSize:6.5,fontStyle:"bold"},
    columnStyles:{0:{cellWidth:26,fontStyle:"bold",textColor:[170,162,148]},1:{cellWidth:20,textColor:[100,95,90]},2:{cellWidth:20},3:{cellWidth:20},4:{cellWidth:22,textColor:or,fontStyle:"bold"},5:{cellWidth:18,halign:"center",textColor:or},6:{cellWidth:16,halign:"center",textColor:or},7:{cellWidth:"auto",textColor:[155,148,138],fontSize:7.5}},
    alternateRowStyles:{fillColor:[20,20,20]},didParseCell:d=>{if(d.section==="body"&&d.row.index>=5&&d.column.index===0)d.cell.styles.textColor=[75,70,66]}});
  const at=doc.lastAutoTable.finalY+4,rh=H-at-14,half=(W-20)/2,tot=wtot(days);
  doc.setFillColor(...cb);doc.roundedRect(8,at,W-16,12,2,2,"F");doc.setDrawColor(30,30,30);doc.roundedRect(8,at,W-16,12,2,2,"S");
  [["TOTAL HOURS",tot>0?fh(tot):"—"],["DAYS WORKED",String(days.filter(d=>d.total!=null).length)],["ON CALL",String(days.filter(d=>d.onCall).length)],["LAHA",String(days.filter(d=>d.laha).length)]].forEach(([l,v],i)=>{const x=14+(W-16)/4*i;doc.setFont("helvetica","normal");doc.setFontSize(6);doc.setTextColor(80,75,70);doc.text(l,x,at+5);doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor(...or);doc.text(v,x,at+10)});
  const st=at+16;
  doc.setFillColor(...cb);doc.roundedRect(8,st,half,rh-2,2,2,"F");doc.setDrawColor(30,30,30);doc.roundedRect(8,st,half,rh-2,2,2,"S");
  doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(...or);doc.text("SIGNATURES",13,st+6);
  [["EMPLOYEE NAME",document.getElementById("se")?.value||""],["EMPLOYEE SIGNATURE",document.getElementById("ss")?.value||""],["CLIENT REP NAME",document.getElementById("cr")?.value||""],["CLIENT SIGNATURE",document.getElementById("cs")?.value||""]].forEach(([l,v],i)=>{const y=st+12+i*((rh-14)/4);doc.setFont("helvetica","normal");doc.setFontSize(6);doc.setTextColor(80,75,70);doc.text(l,13,y);doc.setFont("helvetica","bold");doc.setFontSize(8.5);doc.setTextColor(...li);doc.text(v||"—",13,y+4.5);doc.setDrawColor(30,30,30);doc.line(13,y+6,8+half-5,y+6)});
  doc.setFillColor(...cb);doc.roundedRect(8+half+4,st,half,rh-2,2,2,"F");doc.setDrawColor(30,30,30);doc.roundedRect(8+half+4,st,half,rh-2,2,2,"S");
  doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(...or);doc.text("NOTES",8+half+9,st+6);
  const notes=document.getElementById("snotes")?.value||"";
  doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(...li);
  doc.text(doc.splitTextToSize(notes||"No notes.",half-10),8+half+9,st+12);
  doc.setFont("helvetica","normal");doc.setFontSize(6.5);doc.setTextColor(45,42,40);
  doc.text("SPECIALISED CIVIL & ELECTRICAL PTY LTD  ·  ABN 56 627 507 028  ·  tweekes@scepl.com.au  ·  Billywillinga NSW 2795",W/2,H-3,{align:"center"});
  doc.save(`SCE_${(meta.empName||"guest").replace(/\s+/g,"_")}_${meta.weekEnding||"week"}.pdf`);
}
</script>
